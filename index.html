<!DOCTYPE html>
<html lang="en">
<head>
<link rel="shortcut icon" href="playericon.png">
<title>Standalone Audio Player</title>
  <!-- Load the custom CSS style file -->
<link rel="stylesheet" href="css/style.css"/>
  <!-- Load font family OpenSans -->
<link rel="stylesheet" href="opensans/opensans.css"/>
  <!-- Load FontAwesome icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">
</head>
<body>
 <div class="content">
  <!-- /playlist /-->
   <div style="position:absolute;top:21px;left:16px;"><a class="sta" onclick="showHide('playlist', null);"><i class="fas fa-angle-double-down"></i></a></div><br>
  <div id="playlist" style="display:none;" dir="ltr">
   <div class="track-number" onclick="numberTrack(track_index ,number = '0')">01.</div><div class="tooltip">Night Owl<p>Broke For Free</p></div>
   <div class="track-number" onclick="numberTrack(track_index ,number = '1')">02.</div><div class="tooltip">Enthusiast<p>Tours</p></div>
   <div class="track-number" onclick="numberTrack(track_index ,number = '2')">03.</div><div class="tooltip">Shipping Lanes<p>Chad Crouch</p></div>
  <!-- /add moore tracks here /-->
  </div>
   <div class="player">
    <div class="details">
     <div class="now-playing">Playing x of y</div>
     <div class="track-art"></div>
     <div class="track-name">Track Name</div>
     <div class="track-artist">Track Artist</div>
    </div>
    <div class="buttons">
      <div class="prev-track" onclick="prevTrack()"><i class="fa fa-step-backward fa-2x"></i></div>
      <div class="playpause-track" onclick="playpauseTrack()"><i class="fa fa-play-circle fa-3x"></i></div>
      <div class="next-track" onclick="nextTrack()"><i class="fa fa-step-forward fa-2x"></i></div>
    </div>
    <div class="slider_container">
      <div class="current-time">00:00</div>
      <input type="range" min="1" max="100" value="0" class="seek_slider" onchange="seekTo()">
      <div class="total-duration">00:00</div>
    </div>
      <div id="range_value"></div>
    <div class="slider_container">
      <i class="fa fa-volume-down"></i>
      <input type="range" min="0" max="100" value="99" class="volume_slider" id="rangeValue" onchange="setVolume()">
      <i class="fa fa-volume-up"></i>
    </div>
   </div>
 </div>
<script src="js/main.js"></script>
</body>
</html>
